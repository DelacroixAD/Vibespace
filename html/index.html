<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css"
    rel="stylesheet"
/>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="main">
    
    <section class="allElems">
        <div class="todo elem" id="0">                                                                                 
            <img src="https://i.pinimg.com/736x/5e/59/c4/5e59c43bce967816d5ef4a53eaad2192.jpg" alt="">
            <h2>To Do List</h2>
        </div>
        <div class="daily elem"  id="1">
            <img src="https://i.pinimg.com/1200x/71/37/45/7137458adc32d8d1e041bd78a157ece8.jpg" alt="">
            <h2>Daily Planner</h2>
        </div>
        <div class="moti elem" id="2">
            <img src="https://i.pinimg.com/736x/b9/0f/f9/b90ff961515c0147052fa1f04429c7fd.jpg" alt="">
            
            <h2>Motivation</h2>
        </div>
        <div class="pomo elem" id="3">
            <img src="https://i.pinimg.com/736x/9f/3a/67/9f3a671a64235833f003824cbb3c7e23.jpg" alt="">
            
            <h2>Pomodoro</h2>
        </div>
        <div class="goals elem" id="4">
            <img src="https://i.pinimg.com/736x/4d/a4/16/4da4161bbf057a2ad82ccfcd5f1140c3.jpg" alt="">
            <h2>Daily Goals</h2>
        </div>
    </section>

    <section class="fullElem todo-list-fullpage">
        <button class="back" id="0">Close</button>
        <h2>Your Personalized Task List</h2>
        <div class="todo-container">
            <div class="addTask">
                <form>
                    <input type="text" placeholder="Enter Task">
                    <textarea placeholder="Enter Details" id="" cols="30"></textarea>
                    <button>Add Task</button>
                </form>
            </div>
            <div class="allTask"></div>
        </div>
    </section>
    <section class="fullElem daily-planner-fullpage">
        <button class="back" id="1">Close</button>
        <h1>Daily Planner</h1>
    </section>
    <section class="fullElem motivational-fullpage" >
        <button class="back" id="2">Close</button>
        <h1>Motivational Quote</h1>
    </section>
    <section class="fullElem pomodoro-fullpage" >
        <button class="back" id="3">Close</button>
        <h1>Pomodoro Timer</h1>
    </section>
    <section class="fullElem daily-goals-fullpage">
        <button class="back" id="4">Close</button>
        <h1>Daily Goals</h1>
    </section>
    </div>
    
    <script src="../js/script.js"></script>
</body>
</html>
